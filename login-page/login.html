<html lang="en">
    <head>
        <title>Login</title>
        <link rel="stylesheet" href="login.css">
    </head>
    <body>
        <div class="hero">
            <div class="form-box">
                <div class="button-box">
                    <div id="btn"></div>
                    <button type="button" class="toggle-btn" onclick="login()">Log In</button>
                    <button type="button" class="toggle-btn" onclick="register()">Register</button>
                </div>
                <div class="social-icons">
                    <a href="/error.html"><img src="fb.png"></a>
                   <a href="/error.html"><img src="tw.png"></a> 
                   <a href="/error.html"><img src="gp.png"></a>
                </div>
                <form id="login" class="input-group">
                    <input type="text" class="input-field" placeholder="Usser ID" required>
                    <input type="password" class="input-field" placeholder="Password" required>
                    <input type="checkbox" class="check-box"><span>Remember Password</span>
                    <button type="submit" class="submit-btn"><a href="logged.html">Log in</a></button>
                </form>
                <form id="register" class="input-group">
                    <input type="text" class="input-field" placeholder="Usser ID" required>
                    <input type="email" class="input-field" placeholder="Email ID" required>
                    <input type="password" class="input-field" placeholder="Password" required>
                    <input type="checkbox" class="check-box"><span>I agree to all the terms & conditions</span>
                    <button type="submit" class="submit-btn"><a href="reg.html">Register</a></button>
                </form>
            </div>
        </div>
         <script>
            var x = document.getElementById("login");
            var y = document.getElementById("register");
            var z = document.getElementById("btn");

            function register() {
                x.style.left = "-400px";
                y.style.left = "50px";
                z.style.left = "110px";
            }
            function login() {
                x.style.left = "50px";
                y.style.left = "450px";
                z.style.left = "0px";
            }
         </script>
    </body>
</html>
